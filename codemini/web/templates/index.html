<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeMini Копирайтер</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1923; color: #e0e0e0; min-height: 100vh; }
  .container { max-width: 820px; margin: 0 auto; padding: 20px; }
  h1 { text-align: center; color: #4fc3f7; margin-bottom: 8px; font-size: 1.6rem; }
  .subtitle { text-align: center; color: #888; margin-bottom: 24px; font-size: 0.9rem; }
  .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .btn { padding: 13px 16px; border: none; border-radius: 10px; font-size: 0.92rem; cursor: pointer; transition: all 0.2s; font-weight: 500; }
  .btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-primary   { background: #4fc3f7; color: #0f1923; grid-column: 1 / -1; }
  .btn-obzor     { background: #29b6f6; color: #0f1923; }
  .btn-compare   { background: #7e57c2; color: white; }
  .btn-guide     { background: #26a69a; color: white; }
  .btn-week      { background: #66bb6a; color: #0f1923; grid-column: 1 / -1; }
  .btn-test      { background: #2e7d32; color: white; }
  .btn-stop      { background: #e53935; color: white; }
  .btn-restart   { background: #f57c00; color: white; }
  .btn-check     { background: #1565c0; color: white; grid-column: 1 / -1; }
  .btn-plan      { background: #1e2a38; color: #aaa; grid-column: 1 / -1; border: 1px solid #2e3f50; }
  .btn-vk        { background: #0077ff; color: white; }
  .btn-ok        { background: #f7931e; color: white; }
  .input-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .input-row input { flex: 1; padding: 12px 16px; border-radius: 10px; border: 1px solid #2e3f50; background: #131f2b; color: #e0e0e0; font-size: 0.95rem; }
  .input-row input:focus { outline: none; border-color: #4fc3f7; }
  .type-select { padding: 12px; border-radius: 10px; border: 1px solid #2e3f50; background: #131f2b; color: #e0e0e0; font-size: 0.9rem; }
  .log { background: #131f2b; border-radius: 12px; padding: 16px; min-height: 220px; max-height: 520px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.87rem; line-height: 1.7; border: 1px solid #1e2e3e; }
  .log-line { padding: 2px 0; }
  .log-line.success { color: #66bb6a; }
  .log-line.error   { color: #ef5350; }
  .log-line.link a  { color: #4fc3f7; word-break: break-all; }
  .log-line.info    { color: #90a4ae; }
  .log-empty { color: #3a4f5f; font-style: italic; }
  .date-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
  .date-row input { padding: 12px 16px; border-radius: 10px; border: 1px solid #2e3f50; background: #131f2b; color: #e0e0e0; font-size: 0.95rem; width: 200px; }
  .date-row label { color: #888; font-size: 0.9rem; }
  .section-title { color: #607d8b; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .divider { border: none; border-top: 1px solid #1e2e3e; margin: 18px 0; }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #3a4f5f; margin-right: 8px; }
  .status-dot.active { background: #66bb6a; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .social-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .social-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 6px; font-size: 0.78rem; font-weight: 500; }
  .badge-on  { background: #1b3a1b; color: #66bb6a; border: 1px solid #2e7d32; }
  .badge-off { background: #2a1f1f; color: #888; border: 1px solid #3a2a2a; }
  .social-check { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 0.88rem; color: #90a4ae; }
  .social-check input[type=checkbox] { width: 16px; height: 16px; accent-color: #4fc3f7; cursor: pointer; }
</style>
</head>
<body>
<div class="container">
  <h1>🖥️ CodeMini Копирайтер</h1>
  <p class="subtitle">Генератор статей для codemini.ru — курсы программирования для детей</p>

  <!-- Соцсети статус -->
  <div id="social_status_row" style="display:flex;gap:8px;justify-content:center;margin-bottom:18px;"></div>

  <!-- Одиночная статья -->
  <p class="section-title">Написать статью</p>
  <div class="input-row">
    <input type="text" id="topic" placeholder="Тема статьи..." onkeydown="if(event.key==='Enter') generateArticle()" />
    <select class="type-select" id="article_type">
      <option value="обзор">📋 Обзор</option>
      <option value="сравнение">⚖️ Сравнение</option>
      <option value="гайд">🗺️ Гайд</option>
    </select>
  </div>
  <div class="social-check">
    <input type="checkbox" id="post_social" />
    <label for="post_social">Публиковать в соцсети (ВК, ОК) сразу после WordPress</label>
  </div>
  <div class="buttons">
    <button class="btn btn-primary" onclick="generateArticle()">✍️ Написать статью</button>
    <button class="btn btn-plan" onclick="showPlan()">📋 Контент-план</button>
  </div>

  <!-- Быстрые кнопки по типу -->
  <div class="buttons" style="margin-bottom:8px;">
    <button class="btn btn-obzor"   onclick="quickGenerate('обзор')">📋 Обзор</button>
    <button class="btn btn-compare" onclick="quickGenerate('сравнение')">⚖️ Сравнение</button>
  </div>
  <div class="buttons">
    <button class="btn btn-guide" style="grid-column:1/-1" onclick="quickGenerate('гайд')">🗺️ Гайд</button>
  </div>

  <hr class="divider">

  <!-- Планировщик -->
  <p class="section-title">Запланировать на 10 дней</p>
  <div class="date-row">
    <label>С даты:</label>
    <input type="text" id="start_date" placeholder="01.04 или 01.04.2026" />
  </div>
  <div class="buttons">
    <button class="btn btn-week" onclick="generateWeek(10)">📅 Запланировать на 10 дней</button>
  </div>
  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:20px;">
    <button class="btn btn-test"    onclick="generateWeek(2)">🧪 Тест (2 статьи)</button>
    <button class="btn btn-stop"    id="btn_stop" onclick="stopGeneration()" disabled>⏹ Стоп</button>
    <button class="btn btn-restart" onclick="restartServer()">🔄 Рестарт</button>
  </div>

  <div class="buttons" style="margin-bottom:20px;">
    <button class="btn btn-check" onclick="checkPublished()">🔔 Проверить сегодняшние публикации</button>
  </div>

  <hr class="divider">

  <!-- Соцсети -->
  <p class="section-title">Соцсети</p>
  <div class="social-row">
    <button class="btn btn-vk" onclick="postToSocial('vk')">📘 Последнюю в ВКонтакте</button>
    <button class="btn btn-ok" onclick="postToSocial('ok')">🟠 Последнюю в Одноклассники</button>
  </div>
  <div class="social-row" style="margin-top:8px;">
    <button class="btn btn-vk" style="opacity:0.8;" onclick="postAllToSocial('vk')">📘 Все статьи → ВКонтакте</button>
    <button class="btn btn-ok" style="opacity:0.8;" onclick="postAllToSocial('ok')">🟠 Все статьи → Одноклассники</button>
  </div>
  <p style="color:#607d8b;font-size:0.8rem;margin-bottom:18px;">Требует настройки токенов в .env</p>

  <hr class="divider">

  <!-- Лог -->
  <p class="section-title"><span class="status-dot" id="status_dot"></span>Журнал</p>
  <div class="log" id="log">
    <span class="log-empty">Здесь появятся результаты...</span>
  </div>
</div>

<script>
const SESSION_ID = 'cm_' + Math.random().toString(36).slice(2);

if (localStorage.getItem('restarted')) {
  localStorage.removeItem('restarted');
  document.addEventListener('DOMContentLoaded', () => {
    log('✅ Сервер перезапущен успешно!', 'success');
  });
}

// Загрузка статуса соцсетей
async function loadSocialStatus() {
  try {
    const r = await fetch('/social_status');
    const d = await r.json();
    const row = document.getElementById('social_status_row');
    row.innerHTML =
      `<span class="social-badge ${d.vk ? 'badge-on' : 'badge-off'}">📘 ВКонтакте ${d.vk ? '✓' : '—'}</span>` +
      `<span class="social-badge ${d.ok ? 'badge-on' : 'badge-off'}">🟠 ОК ${d.ok ? '✓' : '—'}</span>`;
  } catch(e) {}
}
document.addEventListener('DOMContentLoaded', loadSocialStatus);

let eventSource = null;

function log(text, type = '') {
  const logEl = document.getElementById('log');
  const empty = logEl.querySelector('.log-empty');
  if (empty) empty.remove();
  const line = document.createElement('div');
  line.className = 'log-line ' + type;
  if (text.startsWith('🔗 ')) {
    const url = text.replace('🔗 ', '');
    line.className += ' link';
    line.innerHTML = '🔗 <a href="' + url + '" target="_blank">' + url + '</a>';
  } else {
    line.textContent = text;
  }
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

function clearLog() {
  document.getElementById('log').innerHTML = '';
}

function setActive(active) {
  document.getElementById('status_dot').className = 'status-dot' + (active ? ' active' : '');
  document.getElementById('btn_stop').disabled = !active;
  document.querySelectorAll('.btn:not(#btn_stop)').forEach(b => b.disabled = active);
}

function startStream() {
  if (eventSource) eventSource.close();
  eventSource = new EventSource('/stream/' + SESSION_ID);
  eventSource.onmessage = function(e) {
    if (e.data === '__PING__') return;
    if (e.data === '__DONE__') {
      eventSource.close();
      setActive(false);
      return;
    }
    const type = e.data.startsWith('✅') || e.data.startsWith('🎉') ? 'success'
               : e.data.startsWith('❌') || e.data.startsWith('⚠️') ? 'error'
               : e.data.startsWith('🔗') ? 'link' : 'info';
    log(e.data, type);
  };
}

async function generateArticle() {
  const topic = document.getElementById('topic').value.trim();
  if (!topic) { alert('Введи тему статьи'); return; }
  clearLog();
  setActive(true);
  startStream();
  await fetch('/generate', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      topic,
      article_type: document.getElementById('article_type').value,
      session_id: SESSION_ID,
      post_social: document.getElementById('post_social').checked,
    })
  });
}

async function quickGenerate(type) {
  const topic = document.getElementById('topic').value.trim();
  if (!topic) { alert('Введи тему статьи'); return; }
  document.getElementById('article_type').value = type;
  clearLog();
  setActive(true);
  startStream();
  await fetch('/generate', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      topic,
      article_type: type,
      session_id: SESSION_ID,
      post_social: document.getElementById('post_social').checked,
    })
  });
}

async function generateWeek(days = 10) {
  const start_date = document.getElementById('start_date').value.trim();
  if (!start_date) { alert('Введи дату начала (например: 01.04)'); return; }
  clearLog();
  setActive(true);
  startStream();
  await fetch('/generate_week', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({start_date, days, session_id: SESSION_ID})
  });
}

async function stopGeneration() {
  await fetch('/stop', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({session_id: SESSION_ID})
  });
  log('⏹ Сигнал остановки отправлен...', 'info');
}

async function restartServer() {
  clearLog();
  log('🔄 Перезапуск сервера...', 'info');
  await fetch('/restart', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: '{}' });
  log('⏳ Подождите 4 секунды...', 'info');
  setTimeout(() => {
    localStorage.setItem('restarted', '1');
    window.location.reload();
  }, 4000);
}

async function showPlan() {
  clearLog();
  const r = await fetch('/plan');
  const data = await r.json();
  data.plan.split('\n').forEach(line => log(line, 'info'));
}

async function checkPublished() {
  clearLog();
  const r = await fetch('/check_published');
  const data = await r.json();
  if (data.posts.length === 0) {
    log(`ℹ️ Сегодня ${data.today} публикаций не найдено`, 'info');
  } else {
    log(`✅ Сегодня ${data.today} опубликовано ${data.posts.length} статей:`, 'success');
    data.posts.forEach(p => {
      log(`📰 ${p.title}`, 'info');
      log(`🔗 ${p.link}`, 'link');
    });
  }
}

async function postToSocial(network) {
  clearLog();
  log(`📢 Пробую опубликовать в ${network === 'vk' ? 'ВКонтакте' : 'Одноклассники'}...`, 'info');
  const r = await fetch('/post_social_last', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({network, session_id: SESSION_ID})
  });
  const data = await r.json();
  if (data.ok) {
    log('✅ Пост опубликован!', 'success');
    if (data.link) log(`🔗 ${data.link}`, 'link');
  } else {
    log(`❌ Ошибка: ${data.error || 'неизвестная ошибка'}`, 'error');
  }
}

async function postAllToSocial(network) {
  clearLog();
  setActive(true);
  startStream();
  await fetch('/post_social_all', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({network, session_id: SESSION_ID})
  });
}
</script>
</body>
</html>
